secrets:
  DRAGONFLY_MAIN_PASSWORD:
    environment: DRAGONFLY_MAIN_PASSWORD

services:
  dragonfly-main:
    container_name: dragonfly-main
    entrypoint: /opt/dragonfly/entrypoint.sh
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 10m
    ports:
      - ${DRAGONFLY_MAIN_EXPOSE_HOST:-127.0.0.1}:${DRAGONFLY_MAIN_EXPOSE_PORT:-6379}:6379
    restart: always
    secrets:
      - DRAGONFLY_MAIN_PASSWORD
    ulimits:
      memlock: -1
    volumes:
      - ./opt:/opt/dragonfly:ro
      - dragonfly-main-data:/data

volumes:
  dragonfly-main-data:
