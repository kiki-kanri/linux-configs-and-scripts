secrets:
  PGADMIN_PASSWORD:
    environment: PGADMIN_PASSWORD

services:
  pgadmin:
    cap_drop:
      - ALL
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL:?must be set}'
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/PGADMIN_PASSWORD
      PGADMIN_DISABLE_POSTFIX: '1'
      PGADMIN_LISTEN_PORT: 8080
      TZ: UTC
    image: dpage/pgadmin4:latest
    logging:
      driver: json-file
      options:
        max-file: '2'
        max-size: 10m
    ports:
      - '${PGADMIN_EXPOSE_HOST:-127.0.0.1}:${PGADMIN_EXPOSE_PORT:-9003}:8080'
    restart: always
    secrets:
      - PGADMIN_PASSWORD
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgadmin-data:
