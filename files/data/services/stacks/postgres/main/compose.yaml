secrets:
  POSTGRES_MAIN_PASSWORD:
    environment: POSTGRES_MAIN_PASSWORD

services:
  postgres-main:
    container_name: postgres-main
    environment:
      POSTGRES_DB: '${POSTGRES_MAIN_DATABASE:-postgres}'
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_MAIN_PASSWORD
      POSTGRES_USER: '${POSTGRES_MAIN_USER:-postgres}'
      TZ: UTC
    image: postgres:18
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 10m
    ports:
      - '${POSTGRES_MAIN_EXPOSE_HOST:-127.0.0.1}:${POSTGRES_MAIN_EXPOSE_PORT:-5432}:5432'
    restart: always
    secrets:
      - POSTGRES_MAIN_PASSWORD
    shm_size: 256m
    stop_grace_period: 1m
    volumes:
      - '${POSTGRES_MAIN_BACKUPS_PATH:?must be set}:/mnt/backups'
      - '${POSTGRES_MAIN_FILES_PATH:?must be set}:/var/lib/postgresql'
